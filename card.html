<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Valeria Batiz</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Jost',sans-serif;background:#0f0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px 16px;color:#e8e0f0;-webkit-tap-highlight-color:transparent}

/* === CARD === */
.card-wrap{perspective:1200px;width:100%;max-width:380px;aspect-ratio:1.7/1;margin-bottom:24px;cursor:pointer}
.card-wrap.flipped .card-inner{transform:rotateY(180deg)}
.card-inner{position:relative;width:100%;height:100%;transition:transform .7s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;overflow:hidden}
.face-back{transform:rotateY(180deg)}

/* Gold border */
.gold-frame{position:absolute;inset:0;border-radius:18px;border:2.5px solid transparent;background:linear-gradient(135deg,#c9a96e,#e8d5a8,#c9a96e,#b8944a,#e8d5a8) border-box;-webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;z-index:10;pointer-events:none}
.gold-inner{position:absolute;inset:6px;border-radius:13px;border:.5px solid rgba(201,169,110,.2);z-index:10;pointer-events:none}

/* Corner ornaments */
.orn{position:absolute;z-index:11;opacity:.35}
.orn svg{width:22px;height:22px}
.orn-tl{top:8px;left:8px}
.orn-br{bottom:8px;right:8px;transform:rotate(180deg)}

/* === FRONT === */
.front{background:linear-gradient(160deg,#1e1033,#2d1f4e 40%,#3b2d5c 70%,#2d1f4e);display:flex;align-items:center;box-shadow:0 20px 50px rgba(0,0,0,.5)}
.front::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(139,92,246,.12),transparent 60%),radial-gradient(ellipse at 80% 70%,rgba(201,169,110,.08),transparent 50%)}
.front-content{display:flex;align-items:center;gap:5%;padding:8% 7%;width:100%;height:100%;position:relative;z-index:2}
.front-photo{width:35%;aspect-ratio:1;border-radius:50%;object-fit:cover;object-position:center 20%;border:2px solid rgba(201,169,110,.35);box-shadow:0 6px 20px rgba(0,0,0,.4);flex-shrink:0}
.front-text{flex:1;min-width:0}
.front-name{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,6vw,30px);font-weight:700;line-height:1.1;background:linear-gradient(135deg,#e8d5a8,#fff,#e8d5a8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.front-sub{font-size:clamp(6px,2vw,9px);text-transform:uppercase;letter-spacing:3px;color:#c4b5fd;margin-bottom:8px}
.front-line{width:40px;height:1.5px;background:linear-gradient(90deg,#c9a96e,#e8d5a8,transparent);margin-bottom:8px;border-radius:2px}
.front-tagline{font-size:clamp(8px,2.5vw,11px);color:rgba(255,255,255,.45);font-weight:300;font-style:italic}
.front-diamond{position:absolute;bottom:12px;right:16px;font-size:10px;color:rgba(201,169,110,.25);z-index:2}

/* === BACK === */
.back{background:linear-gradient(160deg,#faf8ff,#f5f0ff 50%,#ede9fe);color:#3e3555;display:flex;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.back::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 20%,rgba(139,92,246,.06),transparent 50%)}
.back-content{display:flex;align-items:center;gap:5%;padding:6% 7%;width:100%;height:100%;position:relative;z-index:2}
.back-left{flex:1;min-width:0}
.back-title{font-family:'Cormorant Garamond',serif;font-size:clamp(13px,4vw,16px);font-weight:700;color:#1e1033;margin-bottom:2px}
.back-subtitle{font-size:clamp(5px,1.5vw,7px);text-transform:uppercase;letter-spacing:2.5px;color:#8b5cf6;margin-bottom:8px}
.back-line{width:35px;height:1px;background:linear-gradient(90deg,#c9a96e,transparent);margin-bottom:8px;border-radius:1px}
.back-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:clamp(8px,2.5vw,10px);color:#3e3555;font-weight:300}
.back-item:last-child{margin-bottom:0}
.back-ico{width:clamp(16px,5vw,22px);height:clamp(16px,5vw,22px);border-radius:6px;background:linear-gradient(135deg,#ede9fe,#ddd6fe);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:.5px solid rgba(139,92,246,.12)}
.back-ico svg{width:55%;height:55%;stroke:#7c3aed;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.back-qr-wrap{flex-shrink:0;text-align:center}
.back-qr{width:clamp(55px,18vw,80px);height:clamp(55px,18vw,80px);border-radius:10px;border:2px solid rgba(201,169,110,.25);box-shadow:0 2px 10px rgba(139,92,246,.1)}
.back-scan{font-size:6px;text-transform:uppercase;letter-spacing:2px;color:#8b5cf6;font-weight:500;margin-top:4px}

/* Flip hint */
.flip-hint{font-size:12px;color:rgba(255,255,255,.3);text-align:center;margin-bottom:20px;letter-spacing:1px}
.flip-hint span{display:inline-block;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* === ACTIONS === */
.actions{width:100%;max-width:380px;display:flex;flex-direction:column;gap:10px}
.save-btn{width:100%;padding:16px;border:none;border-radius:16px;background:linear-gradient(135deg,#c9a96e,#b8944a);color:#1a1128;font-family:'Jost',sans-serif;font-size:14px;font-weight:600;letter-spacing:1.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 20px rgba(201,169,110,.3);transition:all .2s;-webkit-appearance:none}
.save-btn:active{transform:scale(.97);box-shadow:0 2px 10px rgba(201,169,110,.2)}
.save-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.row-btns{display:flex;gap:10px}
.act-btn{flex:1;padding:14px 10px;border:1px solid rgba(139,92,246,.2);border-radius:14px;background:rgba(139,92,246,.06);color:#a78bfa;font-family:'Jost',sans-serif;font-size:12px;font-weight:400;letter-spacing:.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;-webkit-appearance:none}
.act-btn:active{background:rgba(139,92,246,.15);transform:scale(.97)}
.act-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.cv-link{display:block;text-align:center;margin-top:16px;font-size:11px;color:rgba(139,92,246,.5);text-decoration:none;letter-spacing:1px}
.cv-link:active{color:rgba(139,92,246,.8)}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e1033;border:1px solid #c9a96e;color:#e8d5a8;padding:12px 22px;border-radius:14px;font-size:13px;z-index:100;transition:transform .35s ease;box-shadow:0 8px 25px rgba(0,0,0,.5);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="flip-hint"><span>👆</span> Tocá la tarjeta para girarla</div>

<div class="card-wrap" id="cardWrap" onclick="this.classList.toggle('flipped')">
  <div class="card-inner">
    <!-- FRENTE -->
    <div class="face front">
      <div class="gold-frame"></div><div class="gold-inner"></div>
      <div class="orn orn-tl"><svg viewBox="0 0 24 24"><path d="M2 22V8C2 4.7 4.7 2 8 2H22" fill="none" stroke="#c9a96e" stroke-width="1"/><circle cx="2" cy="22" r="1.2" fill="#c9a96e"/></svg></div>
      <div class="orn orn-br"><svg viewBox="0 0 24 24"><path d="M2 22V8C2 4.7 4.7 2 8 2H22" fill="none" stroke="#c9a96e" stroke-width="1"/><circle cx="2" cy="22" r="1.2" fill="#c9a96e"/></svg></div>
      <div class="front-content">
        <img class="front-photo" id="photo" src="photo.jpg" alt="VB" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22120%22><rect fill=%22%231e1033%22 width=%22120%22 height=%22120%22 rx=%2260%22/><text x=%2260%22 y=%2268%22 text-anchor=%22middle%22 fill=%22%23c9a96e%22 font-size=%2236%22>VB</text></svg>'">
        <div class="front-text">
          <div class="front-name">Valeria Batiz</div>
          <div class="front-sub">Presentación Personal</div>
          <div class="front-line"></div>
          <div class="front-tagline">"Compromiso, responsabilidad<br>y buena predisposición"</div>
        </div>
        <div class="front-diamond">❖</div>
      </div>
    </div>
    <!-- DORSO -->
    <div class="face face-back back">
      <div class="gold-frame"></div><div class="gold-inner"></div>
      <div class="orn orn-tl"><svg viewBox="0 0 24 24"><path d="M2 22V8C2 4.7 4.7 2 8 2H22" fill="none" stroke="#c9a96e" stroke-width="1"/><circle cx="2" cy="22" r="1.2" fill="#c9a96e"/></svg></div>
      <div class="orn orn-br"><svg viewBox="0 0 24 24"><path d="M2 22V8C2 4.7 4.7 2 8 2H22" fill="none" stroke="#c9a96e" stroke-width="1"/><circle cx="2" cy="22" r="1.2" fill="#c9a96e"/></svg></div>
      <div class="back-content">
        <div class="back-left">
          <div class="back-title">Valeria Batiz</div>
          <div class="back-subtitle">Datos de Contacto</div>
          <div class="back-line"></div>
          <div class="back-item"><div class="back-ico"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg></div>11 5492-4291</div>
          <div class="back-item"><div class="back-ico"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>valubatiz@gmail.com</div>
          <div class="back-item"><div class="back-ico"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></div>H. Yrigoyen 1584, Quilmes</div>
        </div>
        <div class="back-qr-wrap">
          <img class="back-qr" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://ivankorzy25.github.io/valeria-cv/card.html&color=6d28d9&bgcolor=faf8ff" alt="QR">
          <div class="back-scan">Escaneá</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="actions">
  <button class="save-btn" onclick="event.stopPropagation();saveContact()">
    <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
    GUARDAR EN MI AGENDA
  </button>
  <div class="row-btns">
    <a class="act-btn" href="https://wa.me/5491154924291?text=Hola%20Valeria!" onclick="event.stopPropagation()">
      <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>WhatsApp
    </a>
    <a class="act-btn" href="tel:+541154924291" onclick="event.stopPropagation()">
      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>Llamar
    </a>
    <button class="act-btn" onclick="event.stopPropagation();shareCard()">
      <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>Compartir
    </button>
  </div>
  <a class="cv-link" href="https://ivankorzy25.github.io/valeria-cv/">Ver CV completo →</a>
</div>

<div class="toast" id="toast"></div>

<script>
function saveContact(){
  const v=`BEGIN:VCARD\nVERSION:3.0\nN:Batiz;Valeria;;;\nFN:Valeria Batiz\nTEL;TYPE=CELL:+541154924291\nEMAIL:valubatiz@gmail.com\nADR;TYPE=HOME:;;Hipólito Yrigoyen 1584;Quilmes;Buenos Aires;;Argentina\nURL:https://ivankorzy25.github.io/valeria-cv/card.html\nEND:VCARD`;
  const b=new Blob([v],{type:'text/vcard;charset=utf-8'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');
  a.href=u;a.download='Valeria_Batiz.vcf';a.click();
  URL.revokeObjectURL(u);
  showToast('✅ Abrí el archivo para guardar el contacto');
}
function shareCard(){
  const url='https://ivankorzy25.github.io/valeria-cv/card.html';
  if(navigator.share)navigator.share({title:'Valeria Batiz',text:'Tarjeta de contacto',url});
  else{navigator.clipboard.writeText(url);showToast('📋 Link copiado');}
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500)}
</script>
</body>
</html>
